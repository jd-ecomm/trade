const YELLOW='#FFE000', GREEN='#4ade80', RED='#f87171', BLUE='#60a5fa', PINK='#f472b6', GREY='#71717a', GREY2='#52525b', BORDER='#262626';
const fmtUSD=(v,dp=0)=>'$'+(v??0).toLocaleString('en-US',{maximumFractionDigits:dp,minimumFractionDigits:dp});
const fmtUSDk=v=>v>=1000000?'$'+(v/1000000).toFixed(2)+'M':'$'+(v/1000).toFixed(0)+'k';
const fmtNum=v=>(v??0).toLocaleString('en-US');
const pctDelta=(a,b)=>b===0?null:((a-b)/b*100);
function deltaHTML(value, suffix='%', invert=false) {
  if (value===null || value===undefined || isNaN(value)) return '<span class="delta neutral">—</span>';
  const positive=value>=0;
  const isGood=invert?!positive:positive;
  const cls=isGood?'up':'down';
  return `<span class="delta ${cls}">${positive?'▲':'▼'} ${Math.abs(value).toFixed(1)}${suffix}</span>`;
}
function deltaPtsHTML(value, invert=false) {
  if (value===null || value===undefined || isNaN(value)) return '<span class="delta neutral">—</span>';
  const positive=value>=0;
  const isGood=invert?!positive:positive;
  return `<span class="delta ${isGood?'up':'down'}">${positive?'▲':'▼'} ${Math.abs(value).toFixed(2)} pts</span>`;
}
function kpiCard(label, value, lwValue, pwValue, pyValue, opts={}) {
  const {prefix='', suffix='', dp=0, invert=false} = opts;
  const wow = pctDelta(lwValue, pwValue);
  const yoy = pyValue!==undefined && pyValue!==null ? pctDelta(lwValue, pyValue) : null;
  const valueStr = typeof value==='number' ? value.toLocaleString('en-US',{maximumFractionDigits:dp, minimumFractionDigits:dp}) : value;
  return `<div class="kpi-card">
    <div class="kpi-label">${label}</div>
    <div class="kpi-value">${prefix}${valueStr}${suffix}</div>
    <div class="kpi-deltas">
      <div><span class="delta-label">WoW</span>${deltaHTML(wow, '%', invert)}</div>
      ${yoy!==null?`<div><span class="delta-label">YoY</span>${deltaHTML(yoy, '%', invert)}</div>`:''}
    </div>
  </div>`;
}
function sectionHeader(num, title, sub) {
  return `<div class="section-header"><div class="section-header-row"><div class="section-num">${num}</div><h2 class="section-title">${title}</h2></div>${sub?`<div class="section-sub">${sub}</div>`:''}</div>`;
}
function wswBlock(what, soWhat, whatNext) {
  return `<div class="wsw"><div class="wsw-grid">
    <div><div class="wsw-label">WHAT</div><div class="wsw-text">${what}</div></div>
    <div><div class="wsw-label">SO WHAT</div><div class="wsw-text">${soWhat}</div></div>
    <div><div class="wsw-label">WHAT'S NEXT</div><div class="wsw-text">${whatNext}</div></div>
  </div></div>`;
}

function buildFunnel() {
  const {LW, PW, LW_PY} = DATA;
  let html = '';
  html += sectionHeader('01', 'Conversion Funnel — Last Week', 'Sessions → Cart → Checkout (Shopify-aligned: completed-checkout sessions ÷ sessions)');
  html += `<div class="kpi-grid" style="margin-bottom:24px">
    ${kpiCard('Conversion Rate', LW.cvr, LW.cvr, PW.cvr, LW_PY.cvr, {suffix:'%', dp:2})}
    ${kpiCard('Add to Cart Rate', LW.atc_rate, LW.atc_rate, PW.atc_rate, LW_PY.atc_rate, {suffix:'%', dp:2})}
    ${kpiCard('Cart→Checkout Comp.', LW.co_of_atc, LW.co_of_atc, PW.co_of_atc, null, {suffix:'%', dp:2})}
    ${kpiCard('AOV (Shopify)', LW.aov, LW.aov, PW.aov, LW_PY.aov, {prefix:'$', dp:2})}
  </div>`;

  const funnel = [
    {stage:'Sessions', LW: LW.sessions, PW: PW.sessions},
    {stage:'Add to Cart', LW: LW.cart_adds, PW: PW.cart_adds},
    {stage:'Completed Checkout', LW: LW.completed, PW: PW.completed},
    {stage:'Orders', LW: LW.orders, PW: PW.orders},
  ];
  let funnelHTML = '<div class="panel"><div class="panel-title">Funnel Volume — Last Week vs Prior Week</div><div class="funnel-row">';
  funnel.forEach((s, i) => {
    const wow = pctDelta(s.LW, s.PW);
    const dropLW = i===0 ? 0 : (1 - s.LW / funnel[i-1].LW) * 100;
    const dropPW = i===0 ? 0 : (1 - s.PW / funnel[i-1].PW) * 100;
    funnelHTML += `<div class="funnel-card">
      <div class="funnel-card-label">${s.stage}</div>
      <div class="funnel-card-val">${fmtNum(s.LW)}</div>
      <div class="funnel-card-sub">PW: ${fmtNum(s.PW)} · ${deltaHTML(wow)}</div>
      ${i>0?`<div class="dropoff">
        <div class="dropoff-label">DROP-OFF FROM PREV STAGE</div>
        <div class="dropoff-val">${dropLW.toFixed(1)}%</div>
        <div class="dropoff-sub">PW: ${dropPW.toFixed(1)}% ${deltaPtsHTML(dropLW - dropPW, true)}</div>
      </div>`:''}
    </div>`;
  });
  funnelHTML += '</div></div>';
  html += `<div class="stack">${funnelHTML}
    <div class="panel"><div class="panel-title">Conversion Funnel Rates — YTD Weekly Trend</div><div class="chart-wrap h-300"><canvas id="chartFunnelRates"></canvas></div></div>
    <div class="panel"><div class="panel-title">Daily CVR — Last Week vs Prior Week</div><div class="chart-wrap h-240"><canvas id="chartDailyCVR"></canvas></div></div>
  </div>`;

  html += wswBlock(
    'CVR 1.68% (-2.2% WoW from 1.72%, +1.6% YoY from 1.65% PY). ATC rate held in the 8.3-8.5% range. Cart→Checkout completion 19.5% (slightly softer WoW). AOV $148.70 (+0.6% WoW, +0.4% YoY — flat to slightly up vs PY).',
    'The W18 funnel picture is cleaner than W17. Sessions YoY has dropped from +55% to +20% (paid pacing eased), and CVR YoY +1.6% means per-session conversion is essentially flat YoY. AOV YoY is flat too. So the +21.8% Net Sales YoY this week is mostly traffic volume but at a much healthier ratio than last week. The Landing Pages PDP-blended CVR held at 1.40% (vs 1.37% PY). Funnel is stable, just at a lower volume than W17.',
    'WoW funnel softness now in its third consecutive week — small in each week but cumulative. Continue daily watch. Refresh the zombie-PDP check (NB 204L, Saucony Grid Jazz 9) against W18 data to confirm they are still pulling traffic with sub-0.3% CVR. The mid-funnel (ATC → completed checkout) is stable, so the leakage is at the entry — landing-page-to-ATC step. Worth a CRO check on the highest-traffic PDPs.'
  );
  return html;
}

function buildDiscounts() {

  html += sectionHeader('01', 'Discount Performance — W17 (Apr 26 – May 2)', 'Note: Discount file orders ≠ Shopify eCom orders (different scope/aggregation). Use rates directionally.');

    'Two readings on this. (1) The trend is small in absolute terms — at 1.63% of gross sales, we are still operating at less than half the pre-restriction rate (avg ~2.4%) and well below the Jan promo peak. The post-restriction discount discipline is largely intact. (2) The directional drift is worth watching: three consecutive weeks of rising rate means either approved promotional activity is creeping back, or specific high-discount SKUs/codes are being over-leveraged.',

        }
      },
      plugins:[{
        id:'restrictionLine',
        afterDraw(chart) {
          const idx = chart.data.labels.indexOf('Mar 15');
          if (idx<0) return;
          const xPos = chart.scales.x.getPixelForValue(idx);
          const ctx = chart.ctx;
          ctx.save();
          ctx.strokeStyle = RED;
          ctx.lineWidth = 1.5;
          ctx.setLineDash([4,4]);
          ctx.beginPath();
          ctx.moveTo(xPos, chart.chartArea.top);
          ctx.lineTo(xPos, chart.chartArea.bottom);
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.fillStyle = RED;
          ctx.font = "700 11px 'Barlow Condensed', sans-serif";
          ctx.fillText('Mar 13 Restriction', xPos+4, chart.chartArea.top+12);
          ctx.restore();
        }
      }]
    });
  }
}

    <div class="panel"><div class="panel-title">Category YoY %</div><div class="chart-wrap h-300"><canvas id="chartCatYoY"></canvas></div></div>

  let catTbl = '<div class="panel" style="margin-top:16px"><div class="panel-title">Category Detail</div><table class="tbl"><thead><tr><th>Category</th><th class="r">Net Sales</th><th class="r">Budget</th><th class="r">vs Budget</th><th class="r">% of Total</th><th class="r">PY</th><th class="r">YoY</th></tr></thead><tbody>';
  T.jesta_categories.forEach(c => {
    const isTotal = c.category === 'Total';
    catTbl += `<tr${isTotal?' style="border-top:2px solid var(--yellow);font-weight:700"':''}>
      <td class="strong">${c.category}</td>
      <td class="r strong">${fmtUSD(c.net_sales)}</td>
      <td class="r muted">${fmtUSD(c.budget)}</td>
      <td class="r">${deltaHTML(c.var_pct)}</td>
      <td class="r muted">${c.share.toFixed(1)}%</td>
      <td class="r muted">${fmtUSD(c.previous_year)}</td>
      <td class="r">${deltaHTML(c.yoy_pct)}</td>
    </tr>`;
  });
  catTbl += '</tbody></table></div>';
  html += catTbl;

  // === SECTION 3 — 12-week trends ===
  html += sectionHeader('03', '12-Week Trends — FY27', 'Net Sales vs Budget · Margin & Markdown · Discount Usage');

  html += `<div class="stack">
    <div class="panel"><div class="panel-title">Net Sales vs Budget (12 weeks)</div><div class="chart-wrap h-320"><canvas id="chartNetVsBudget"></canvas></div></div>
    <div class="panel"><div class="panel-title">Margin % · Full Price Share · Markdown Share — Weekly</div><div class="chart-wrap h-320"><canvas id="chartMarginShare"></canvas></div></div>
    <div class="panel"><div class="panel-title">Discount Usage % of Orders — Weekly</div><div class="chart-wrap h-280"><canvas id="chartDiscUsage"></canvas></div></div>
    <div class="panel"><div class="panel-title">Conversion Rate · Sessions — Weekly</div><div class="chart-wrap h-300"><canvas id="chartCvrSess"></canvas></div></div>
    <div class="panel"><div class="panel-title">Category Mix — Weekly Net Sales</div><div class="chart-wrap h-320"><canvas id="chartCatMix"></canvas></div></div>
  </div>`;

  // === SECTION 4 — Cumulative tracking ===
  html += sectionHeader('04', 'Cumulative Tracking — Net Sales vs Budget', 'Running total against running budget');
  html += `<div class="stack">
    <div class="panel"><div class="panel-title">Cumulative Net Sales vs Cumulative Budget — Weekly</div><div class="chart-wrap h-320"><canvas id="chartCumulative"></canvas></div></div>
    <div class="panel"><div class="panel-title">Weekly Variance vs Budget %</div><div class="chart-wrap h-280"><canvas id="chartVarPct"></canvas></div></div>
  </div>`;

  // === SECTION 5 — Forecast ===
  html += sectionHeader('05', 'Run Rate & W15 Forecast', 'Rank-weighted forecast vs W15 budget');

  const w15_gap = T.forecasted_run_rate - 1500000; // W13 budget CA from forecast sheet
  const w15_gap_pct = w15_gap / 1500000 * 100;
  html += `<div class="grid-3">
    <div class="compare-box now"><div class="compare-label">MTD (Last 4 Weeks)</div><div class="compare-value yellow">${fmtUSDk(T.mtd_total.net_sales)}</div><div class="compare-sub">vs ${fmtUSDk(T.mtd_total.budget)} budget · +${T.mtd_total.var_pct.toFixed(1)}% above</div></div>
    <div class="compare-box pre"><div class="compare-label">W13 Forecast (Run Rate)</div><div class="compare-value">${fmtUSDk(T.forecasted_run_rate)}</div><div class="compare-sub">Rank-weighted from W6–W14</div></div>
    <div class="compare-box ${w15_gap >= 0 ? 'now' : 'post'}"><div class="compare-label">W13 vs Budget Gap</div><div class="compare-value">${w15_gap >= 0 ? '+' : ''}${fmtUSDk(w15_gap)}</div><div class="compare-sub">${w15_gap_pct >= 0 ? '+' : ''}${w15_gap_pct.toFixed(1)}% vs W15 budget ${fmtUSDk(1500000)}</div></div>
  </div>`;

  // === SECTION 5 — Region breakdown ===
  html += sectionHeader('06', 'Regional Performance — W14', 'Sessions · Conversion · AOV · Net Sales by region');

  let regTbl = '<div class="panel"><div class="panel-title">Regions — W12 vs W11 vs PY</div><div style="overflow-x:auto"><table class="tbl"><thead><tr><th>Region</th><th class="r">Net Sales</th><th class="r">WoW</th><th class="r">YoY</th><th class="r">Sessions</th><th class="r">Sessions YoY</th><th class="r">CVR</th><th class="r">CVR YoY</th><th class="r">AOV</th><th class="r">AOV YoY</th></tr></thead><tbody>';
  T.regions.forEach(r => {
    regTbl += `<tr>
      <td class="strong">${r.region}</td>
      <td class="r strong">${fmtUSD(r.net_sales_lw)}</td>
      <td class="r">${deltaHTML(r.net_sales_wow)}</td>
      <td class="r">${deltaHTML(r.net_sales_yoy)}</td>
      <td class="r muted">${fmtNum(r.sessions_lw)}</td>
      <td class="r">${deltaHTML(r.sessions_yoy)}</td>
      <td class="r muted">${r.cvr_lw.toFixed(2)}%</td>
      <td class="r">${deltaHTML(r.cvr_yoy)}</td>
      <td class="r muted">${fmtUSD(r.aov_lw, 0)}</td>
      <td class="r">${deltaHTML(r.aov_yoy)}</td>
    </tr>`;
  });
  regTbl += '</tbody></table></div></div>';
  html += regTbl;

  html += `<div class="grid-2" style="margin-top:16px">
    <div class="panel"><div class="panel-title">Net Sales by Region — W12</div><div class="chart-wrap h-300"><canvas id="chartRegSales"></canvas></div></div>
    <div class="panel"><div class="panel-title">Region YoY % (Net Sales)</div><div class="chart-wrap h-300"><canvas id="chartRegYoY"></canvas></div></div>
  </div>`;

  // Region category mix
  html += `<div class="panel" style="margin-top:16px"><div class="panel-title">Category Share by Region — W12</div><div class="chart-wrap h-280"><canvas id="chartRegCat"></canvas></div></div>`;

  // === SECTION 6 — Province detail ===
  html += sectionHeader('07', 'Province Detail — W14', 'Sessions, CVR, AOV, Net Sales by province');

  // Sort provinces by net sales desc using province_sales
  const provSales = [...T.province_sales].sort((a,b) => b.net_sales - a.net_sales);
  let provTbl = '<div class="panel"><div class="panel-title">Provinces — W12 (sorted by Net Sales)</div><div style="overflow-x:auto"><table class="tbl"><thead><tr><th>Province</th><th>Region</th><th class="r">Net Sales</th><th class="r">Orders</th><th class="r">AOV</th><th class="r">AOV PY</th><th class="r">AOV YoY</th><th class="r">Discounts</th></tr></thead><tbody>';
  provSales.forEach(p => {
    const aov_yoy = p.aov_py > 0 ? (p.aov - p.aov_py) / p.aov_py * 100 : null;
    provTbl += `<tr>
      <td class="strong">${p.province}</td>
      <td class="muted">${p.region}</td>
      <td class="r strong">${fmtUSD(p.net_sales)}</td>
      <td class="r">${fmtNum(p.orders)}</td>
      <td class="r">${fmtUSD(p.aov, 2)}</td>
      <td class="r muted">${fmtUSD(p.aov_py, 2)}</td>
      <td class="r">${deltaHTML(aov_yoy)}</td>
      <td class="r muted">${fmtUSD(Math.abs(p.discounts))}</td>
    </tr>`;
  });
  provTbl += '</tbody></table></div></div>';
  html += provTbl;

  // Province CVR detail
  html += `<div class="panel" style="margin-top:16px"><div class="panel-title">Province CVR — W12 vs PY (Sessions ≥ 1k)</div><div style="overflow-x:auto"><table class="tbl"><thead><tr><th>Province</th><th class="r">Sessions LW</th><th class="r">Sessions PY</th><th class="r">Sessions YoY</th><th class="r">CVR LW</th><th class="r">CVR PY</th><th class="r">CVR YoY</th></tr></thead><tbody>`;
  T.provinces.filter(p => p.sessions_lw >= 1000).sort((a,b) => b.sessions_lw - a.sessions_lw).forEach(p => {
    html += `<tr>
      <td class="strong">${p.province}</td>
      <td class="r">${fmtNum(p.sessions_lw)}</td>
      <td class="r muted">${fmtNum(p.sessions_py)}</td>
      <td class="r">${deltaHTML(p.sessions_yoy)}</td>
      <td class="r">${p.cvr_lw.toFixed(2)}%</td>
      <td class="r muted">${p.cvr_py.toFixed(2)}%</td>
      <td class="r">${deltaHTML(p.cvr_yoy)}</td>
    </tr>`;
  });
  html += '</tbody></table></div></div>';

  // === WSW Block ===
  html += wswBlock(
    `Net Sales (JESTA) $1.40M — second consecutive sub-budget week at -4.9% (after W13 -4.0%). WoW essentially flat (+0.5%). Margin recovered further to 39.1% (+0.8 pts WoW, +2.3 pts since W11 low of 36.8%). Full Price share at 48% — matches the 48.4% target for the first time in FY27. Discount Usage rate fell to 13.6% (-0.3 pts WoW, second consecutive decline). Footwear $1.19M, +0.4% WoW, +45.3% YoY (85.0% of mix). Apparel $174k +1.8% WoW but still -25% under budget. BC -1.7% YoY — first negative regional YoY of FY27. MTD on a 4-week stack (W11-W14): $5.69M vs $5.24M budget = +8.6% above budget.`,
    `The margin and price-discipline story is now genuinely good — three weeks of consecutive margin improvement, Full Price share back at target, discount-usage rate cooling. Net Sales softness has continued but the economics underneath have strengthened. The apparel underperformance is now a sustained three-week pattern (-25% under budget in W14) — not noise, structural. BC turning negative YoY is a regional concern worth investigating: BC sessions YoY were positive in W12-W13, the W14 -1.7% suggests a local issue. Quebec & Atlantic remains the bright spot (+41.4% YoY, 2.04% CVR). W15 budget at $1.50M is the highest FY27 weekly budget; rank-weighted forecast of $1.35M would land us ~10% under.`,
    `(1) Apparel diagnosis is now urgent — three weeks of underperformance. SKU-level sell-through audit pre next trade meeting. (2) BC investigation — first negative regional YoY of FY27; verify whether paid spend allocation, traffic mix, or a local trading issue. (3) Credit the margin recovery and Full Price target hit in the trade meeting narrative — direction of travel on price discipline is positive across three consecutive weeks. (4) W15 budget at $1.50M (highest of FY27) — set expectations now that the forecast says we miss by ~10%, identify acquisition levers. (5) The discount-usage drop suggests the W12 spike was an isolated event — recommend dropping the code-level audit from the watch list.`
  );

  return html;
}

function renderTradeMeetingCharts() {
  const T = TRADE;

  // Cat budget vs actual
  const cbe = document.getElementById('chartCatBudget');
  if (cbe) {
    const cats = T.jesta_categories.filter(c => c.category !== 'Total');
    chartInstances.catBudget = new Chart(cbe, {
      type:'bar',
      data:{
        labels: cats.map(c=>c.category),
        datasets:[
          {label:'Budget', data:cats.map(c=>c.budget), backgroundColor:'#52525b', borderRadius:2},
          {label:'W12 Actual', data:cats.map(c=>c.net_sales), backgroundColor:YELLOW, borderRadius:2},
        ]
      },
      options:{
        responsive:true, maintainAspectRatio:false,

      type:'bar',
      data:{
        labels: T.trends.map(w=>w.week),
        datasets:[
          {label:'Footwear', data:T.trends.map(w=>w.footwear), backgroundColor:YELLOW, stack:'s'},
          {label:'Apparel', data:T.trends.map(w=>w.apparel), backgroundColor:'#fbbf24', stack:'s'},
          {label:'Accessories', data:T.trends.map(w=>w.accessories), backgroundColor:'#a16207', stack:'s'},

      options:{
        responsive:true, maintainAspectRatio:false,

    });

      cumNetData.push(cumNet);
      cumBudgetData.push(cumBudget);
    });
    chartInstances.cumulative = new Chart(cue, {
      type:'line',
      data:{

    });

  // Region net sales
  const rse = document.getElementById('chartRegSales');
  if (rse) {
    const sortedReg = [...T.regions].sort((a,b) => b.net_sales_lw - a.net_sales_lw);

      type:'bar',
      data:{

        plugins:{tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+fmtUSDk(ctx.raw)}}}
      }
    });
  }

  // Region YoY
  const rye = document.getElementById('chartRegYoY');
  if (rye) {
    const sortedReg = [...T.regions].sort((a,b) => b.net_sales_yoy - a.net_sales_yoy);
    chartInstances.regYoY = new Chart(rye, {
      type:'bar',
      data:{
        labels: sortedReg.map(r=>r.region),

      },
      options:{
        indexAxis:'y', responsive:true, maintainAspectRatio:false,
        scales:{x:{grid:gridConfig, ticks:{...tickConfig, callback:v=>v.toFixed(0)+'%'}}, y:{grid:gridConfig, ticks:{...tickConfig, color:'#e4e4e7'}}},
        plugins:{legend:{display:false}, tooltip:{callbacks:{label:ctx=>'YoY: '+ctx.raw.toFixed(1)+'%'}}}
      }
    });
  }

  // Region category share
  const rce = document.getElementById('chartRegCat');
  if (rce) {
    chartInstances.regCat = new Chart(rce, {
      type:'bar',
      data:{
        labels: T.regions.map(r=>r.region),
        datasets:[
          {label:'Footwear', data:T.regions.map(r=>r.footwear_lw), backgroundColor:YELLOW, stack:'s'},
          {label:'Apparel', data:T.regions.map(r=>r.apparel_lw), backgroundColor:'#fbbf24', stack:'s'},
          {label:'Accessories', data:T.regions.map(r=>r.accessories_lw), backgroundColor:'#a16207', stack:'s'},
        ]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        scales:{x:{grid:gridConfig, ticks:tickConfig, stacked:true}, y:{grid:gridConfig, ticks:{...tickConfig, callback:v=>'$'+(v/1000).toFixed(0)+'k'}, stacked:true}},
        plugins:{tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+fmtUSDk(ctx.raw)}}}
      }
    });
  }
}

      <div class="kpi-deltas"><div><span class="delta-label">WoW</span>${deltaHTML(pctDelta(M.total_sessions_lw, M.total_sessions_pw))}</div></div>
    </div>
    <div class="kpi-card"><div class="kpi-label">PDP Blended CVR</div>
      <div class="kpi-value">${M.cvr_lw.toFixed(2)}%</div>
      <div class="kpi-deltas"><div><span class="delta-label">WoW</span>${deltaPtsHTML(M.cvr_lw - M.cvr_pw)}</div></div>
    </div>
    <div class="kpi-card"><div class="kpi-label">Completed Checkouts</div>
      <div class="kpi-value">${fmtNum(M.total_comp_lw)}</div>
      <div class="kpi-deltas"><div><span class="delta-label">From PDPs</span><span class="delta neutral">${M.cvr_lw.toFixed(2)}% conv</span></div></div>
    </div>
    <div class="kpi-card"><div class="kpi-label">Unique PDPs</div>
      <div class="kpi-value">${fmtNum(M.total_pages)}</div>
      <div class="kpi-deltas"><div><span class="delta-label">Long tail</span><span class="delta neutral">All product pages</span></div></div>
    </div>
  </div>`;

  // === Section 02 — Weekly Trend ===
  html += sectionHeader('02', 'Weekly PDP Trend', 'Sessions, completed checkouts, blended CVR — full weeks only');
  html += `<div class="grid-2">
    <div class="panel"><div class="panel-title">PDP Sessions vs Completed Checkouts</div><div class="chart-wrap h-280"><canvas id="chartLPVolume"></canvas></div></div>
    <div class="panel"><div class="panel-title">PDP Funnel Rates — Weekly</div><div class="chart-wrap h-280"><canvas id="chartLPRates"></canvas></div></div>
  </div>`;

  // === Section 03 — Top 25 PDPs ===
  html += sectionHeader('03', 'Top 25 PDPs by Sessions — W18', 'Sorted by W18 sessions, with WoW delta and CVR');
  let tbl = '<div class="panel"><div style="overflow-x:auto"><table class="tbl"><thead><tr><th>Page</th><th class="r">Sessions LW</th><th class="r">WoW</th><th class="r">CVR LW</th><th class="r">CVR PW</th><th class="r">ATC%</th><th class="r">Comp.</th></tr></thead><tbody>';
  LP.top_pages.forEach(p => {
    tbl += `<tr>
      <td style="font-size:11px"><span style="color:#a1a1aa">${p.path}</span></td>
      <td class="r strong">${fmtNum(p.sessions_lw)}</td>
      <td class="r">${deltaHTML(p.sessions_wow)}</td>
      <td class="r">${p.cvr_lw.toFixed(2)}%</td>
      <td class="r muted">${p.cvr_pw.toFixed(2)}%</td>
      <td class="r muted">${p.atc_rate_lw.toFixed(1)}%</td>
      <td class="r muted">${fmtNum(p.comp_lw)}</td>
    </tr>`;
  });
  tbl += '</tbody></table></div></div>';
  html += tbl;

  // === Section 04 — Movers ===
  html += sectionHeader('04', 'Top Gainers and Decliners — W18 vs W17', 'PDPs with the biggest WoW session changes (min 500 sessions either week)');
  html += `<div class="grid-2">
    <div class="panel"><div class="panel-title">Top 10 Gainers (sessions)</div><div style="overflow-x:auto"><table class="tbl"><thead><tr><th>Page</th><th class="r">LW</th><th class="r">PW</th><th class="r">Δ</th><th class="r">CVR</th></tr></thead><tbody>${LP.gainers.map(p => `<tr><td style="font-size:11px"><span style="color:#a1a1aa">${p.path}</span></td><td class="r">${fmtNum(p.sessions_lw)}</td><td class="r muted">${fmtNum(p.sessions_pw)}</td><td class="r strong">${deltaHTML(p.delta>=0?100:-100).replace('100.0%','+'+fmtNum(p.delta)).replace('-100.0%',fmtNum(p.delta))}</td><td class="r muted">${p.cvr_lw.toFixed(2)}%</td></tr>`).join('')}</tbody></table></div></div>
    <div class="panel"><div class="panel-title">Top 10 Decliners (sessions)</div><div style="overflow-x:auto"><table class="tbl"><thead><tr><th>Page</th><th class="r">LW</th><th class="r">PW</th><th class="r">Δ</th><th class="r">CVR</th></tr></thead><tbody>${LP.decliners.map(p => `<tr><td style="font-size:11px"><span style="color:#a1a1aa">${p.path}</span></td><td class="r">${fmtNum(p.sessions_lw)}</td><td class="r muted">${fmtNum(p.sessions_pw)}</td><td class="r strong">${deltaHTML(p.delta>=0?100:-100).replace('100.0%','+'+fmtNum(p.delta)).replace('-100.0%',fmtNum(p.delta))}</td><td class="r muted">${p.cvr_lw.toFixed(2)}%</td></tr>`).join('')}</tbody></table></div></div>
  </div>`;

  // === Section 05 — Conversion leaders & laggards ===
  html += sectionHeader('05', 'Conversion Leaders & Laggards — W18', 'CVR among high-traffic PDPs (≥1k sessions LW)');
  html += `<div class="grid-2">
    <div class="panel"><div class="panel-title">Top 15 CVR (Sessions ≥1k)</div><div style="overflow-x:auto"><table class="tbl"><thead><tr><th>Page</th><th class="r">Sessions</th><th class="r">CVR</th><th class="r">ATC%</th><th class="r">Comp.</th></tr></thead><tbody>${LP.top_cvr.map(p => `<tr><td style="font-size:11px"><span style="color:#a1a1aa">${p.path}</span></td><td class="r">${fmtNum(p.sessions_lw)}</td><td class="r strong" style="color:var(--green)">${p.cvr_lw.toFixed(2)}%</td><td class="r muted">${p.atc_rate_lw.toFixed(1)}%</td><td class="r muted">${fmtNum(p.comp_lw)}</td></tr>`).join('')}</tbody></table></div></div>
    <div class="panel"><div class="panel-title">Bottom 15 CVR (Sessions ≥2k)</div><div style="overflow-x:auto"><table class="tbl"><thead><tr><th>Page</th><th class="r">Sessions</th><th class="r">CVR</th><th class="r">ATC%</th><th class="r">Comp.</th></tr></thead><tbody>${LP.bottom_cvr.map(p => `<tr><td style="font-size:11px"><span style="color:#a1a1aa">${p.path}</span></td><td class="r">${fmtNum(p.sessions_lw)}</td><td class="r strong" style="color:var(--red)">${p.cvr_lw.toFixed(2)}%</td><td class="r muted">${p.atc_rate_lw.toFixed(1)}%</td><td class="r muted">${fmtNum(p.comp_lw)}</td></tr>`).join('')}</tbody></table></div></div>
  </div>`;

  // === Section 06 — Brand-level ===
  html += sectionHeader('06', 'Brand-Level PDP Performance — W18 vs W17', 'PDP sessions and conversion grouped by brand');
  let brandTbl = '<div class="panel"><div style="overflow-x:auto"><table class="tbl"><thead><tr><th>Brand</th><th class="r">Sessions LW</th><th class="r">Sessions PW</th><th class="r">WoW</th><th class="r">CVR LW</th><th class="r">CVR PW</th><th class="r">Comp.</th></tr></thead><tbody>';
  LP.brands.forEach(b => {
    brandTbl += `<tr>
      <td class="strong">${b.brand}</td>
      <td class="r strong">${fmtNum(b.sessions_lw)}</td>
      <td class="r muted">${fmtNum(b.sessions_pw)}</td>
      <td class="r">${deltaHTML(b.sessions_wow)}</td>
      <td class="r">${b.cvr_lw.toFixed(2)}%</td>
      <td class="r muted">${b.cvr_pw.toFixed(2)}%</td>
      <td class="r muted">${fmtNum(b.comp_lw)}</td>
    </tr>`;
  });
  brandTbl += '</tbody></table></div></div>';
  html += brandTbl;

  // === Section 07 — YoY VIEW (NEW) ===
  html += sectionHeader('07', 'YoY Comparison — W18 (May 3-9) vs PY (May 4-10, 2025)', 'Landing page traffic, conversion, and brand mix year-on-year');

  const LW_T = Y.LW; const PY_T = Y.PY;
  const sessions_yoy = (LW_T.sessions - PY_T.sessions) / PY_T.sessions * 100;
  const comp_yoy = (LW_T.comp - PY_T.comp) / PY_T.comp * 100;
  const cvr_diff = LW_T.cvr - PY_T.cvr;

  html += `<div class="kpi-grid">
    <div class="kpi-card"><div class="kpi-label">PDP Sessions YoY</div>
      <div class="kpi-value">${fmtNum(LW_T.sessions)}</div>
      <div class="kpi-deltas"><div><span class="delta-label">vs PY</span>${deltaHTML(sessions_yoy)}</div></div>
      <div class="kpi-target">PY: ${fmtNum(PY_T.sessions)}</div>
    </div>
    <div class="kpi-card"><div class="kpi-label">Completed CO YoY</div>
      <div class="kpi-value">${fmtNum(LW_T.comp)}</div>
      <div class="kpi-deltas"><div><span class="delta-label">vs PY</span>${deltaHTML(comp_yoy)}</div></div>
      <div class="kpi-target">PY: ${fmtNum(PY_T.comp)}</div>
    </div>
    <div class="kpi-card"><div class="kpi-label">PDP CVR YoY</div>
      <div class="kpi-value">${LW_T.cvr.toFixed(2)}%</div>
      <div class="kpi-deltas"><div><span class="delta-label">vs PY</span>${deltaPtsHTML(cvr_diff)}</div></div>
      <div class="kpi-target">PY: ${PY_T.cvr.toFixed(2)}%</div>
    </div>
    <div class="kpi-card"><div class="kpi-label">PDPs in Use YoY</div>
      <div class="kpi-value">${fmtNum(LW_T.unique_pages)}</div>
      <div class="kpi-deltas"><div><span class="delta-label">vs PY</span>${deltaHTML(pctDelta(LW_T.unique_pages, PY_T.unique_pages))}</div></div>
      <div class="kpi-target">PY: ${fmtNum(PY_T.unique_pages)}</div>
    </div>
  </div>`;

  // Weekly trend with PY overlay
  html += `<div class="panel" style="margin-top:16px"><div class="panel-title">Weekly PDP Sessions vs PY (52w-matched)</div><div class="chart-wrap h-300"><canvas id="chartLPSessionsYoY"></canvas></div></div>`;

  // Brand YoY
  html += `<div class="panel" style="margin-top:16px"><div class="panel-title">Brand-Level YoY (W18 vs W18 PY)</div><div style="overflow-x:auto"><table class="tbl"><thead><tr><th>Brand</th><th class="r">Sessions LW</th><th class="r">Sessions PY</th><th class="r">YoY</th><th class="r">CVR LW</th><th class="r">CVR PY</th><th class="r">Comp YoY</th></tr></thead><tbody>`;
  LP.brands_yoy.forEach(b => {
    html += `<tr>
      <td class="strong">${b.brand}</td>
      <td class="r strong">${fmtNum(b.sessions_lw)}</td>
      <td class="r muted">${fmtNum(b.sessions_py)}</td>
      <td class="r">${deltaHTML(b.sessions_yoy)}</td>
      <td class="r">${b.cvr_lw.toFixed(2)}%</td>
      <td class="r muted">${b.cvr_py.toFixed(2)}%</td>
      <td class="r">${deltaHTML(b.comp_yoy)}</td>
    </tr>`;
  });
  html += '</tbody></table></div></div>';

  // === WSW ===
  html += wswBlock(
    `${fmtNum(M.total_sessions_lw)} PDP sessions in W18, blended CVR ${M.cvr_lw.toFixed(2)}% (vs ${M.cvr_pw.toFixed(2)}% W17). YoY: PDP sessions +${sessions_yoy.toFixed(1)}%, completed checkouts +${comp_yoy.toFixed(1)}%, CVR ${cvr_diff>=0?'+':''}${cvr_diff.toFixed(2)} pts. Brand YoY highlights — Hoka +501%, Salomon +382%, Adidas +87%, Asics +37%, Jordan +34%. Nike only +12% YoY (largest by absolute volume but slowest growing). Top PDPs by sessions in W18 include the usual leading SKUs; conversion laggards (sub-0.3% CVR with thousands of sessions) remain a real issue worth diagnosing.`,
    `The brand YoY view is the most important new finding. Hoka, Salomon, and Adidas have grown PDP traffic dramatically year-on-year (+87% to +501%) — these are the brands carrying the FY27 +33% PDP-session YoY growth. Nike at only +12% is significant because it remains the largest brand by absolute volume but the slowest-growing — suggests the JD-Nike strategic conversation could focus on whether Nike spend should index to match the category growth, or whether JD is correctly reallocating focus to faster-growing partners (Hoka, Salomon, On). CVR YoY change is small (+0.03 pts blended), so the YoY revenue growth is overwhelmingly session-driven, not conversion-driven — same finding as the eCom YoY data.`,
    `(1) Bring the Hoka, Salomon, Adidas YoY-growth story to brand co-op conversations — these partners are working hardest on traffic. (2) Nike growth-lag investigation: is this strategic deprioritisation, a Nike-side product/pricing issue, or a competitor share-shift? Worth flagging to the Nike account team. (3) The conversion-laggard PDPs (zombie SKUs sub-0.3% CVR with thousands of weekly sessions) remain the largest unforced error in the PDP funnel — paid spend reallocation should be straightforward. (4) Drill the long-tail: 75k unique PDPs YoY (vs 60k PY +25%) means more product depth on site, but blended CVR has held flat — the long-tail itself isn't degrading conversion, so depth strategy is working.`
  );

  return html;
}

function renderLandingPagesCharts() {
  // Weekly volume — sessions and comp
  const cv = document.getElementById('chartLPVolume');
  if (cv) {
    chartInstances.lpVolume = new Chart(cv, {
      data: {
        labels: LP.weekly.map(w => w.week),
        datasets: [
          {type:'bar', label:'Sessions', data: LP.weekly.map(w => w.sessions), backgroundColor: 'rgba(255,224,0,0.6)', yAxisID: 'y', order: 2},
          {type:'line', label:'Completed Checkouts', data: LP.weekly.map(w => w.comp), borderColor: YELLOW, backgroundColor: YELLOW, yAxisID: 'y2', tension: 0.2, pointRadius: 3, borderWidth: 2.5},
        ]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        scales: {
          x:{grid:gridConfig, ticks:tickConfig},
          y:{grid:gridConfig, ticks:{...tickConfig, callback:v=>(v/1000).toFixed(0)+'k'}, position:'left'},
          y2:{grid:{display:false}, ticks:{...tickConfig, callback:v=>fmtNum(v)}, position:'right'}
        },
        plugins:{tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+fmtNum(ctx.raw)}}}
      }
    });
  }
  // Funnel rates
  const cr = document.getElementById('chartLPRates');
  if (cr) {
    chartInstances.lpRates = new Chart(cr, {
      type: 'line',
      data: {
        labels: LP.weekly.map(w => w.week),
        datasets: [
          {label:'CVR', data: LP.weekly.map(w => w.cvr), borderColor: YELLOW, backgroundColor: YELLOW, tension: 0.2, pointRadius: 3, borderWidth: 2.5},
          {label:'ATC Rate', data: LP.weekly.map(w => w.atc_rate), borderColor: BLUE, backgroundColor: BLUE, tension: 0.2, pointRadius: 3},
          {label:'Reach Rate', data: LP.weekly.map(w => w.reach_rate), borderColor: GREEN, backgroundColor: GREEN, tension: 0.2, pointRadius: 3, borderDash:[3,3]},
        ]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        scales:{x:{grid:gridConfig, ticks:tickConfig}, y:{grid:gridConfig, ticks:{...tickConfig, callback:v=>v.toFixed(1)+'%'}}},
        plugins:{tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+ctx.raw.toFixed(2)+'%'}}}
      }
    });
  }
  // Weekly sessions YoY
  const cy = document.getElementById('chartLPSessionsYoY');
  if (cy) {
    chartInstances.lpSessYoY = new Chart(cy, {
      type: 'line',
      data: {
        labels: LP.weekly_yoy.map(w => w.week),
        datasets: [
          {label:'Sessions LW', data: LP.weekly_yoy.map(w => w.sessions), borderColor: YELLOW, backgroundColor: YELLOW, tension: 0.2, pointRadius: 3, borderWidth: 2.5},
          {label:'Sessions PY (52w match)', data: LP.weekly_yoy.map(w => w.sessions_py), borderColor: '#a1a1aa', backgroundColor: '#a1a1aa', tension: 0.2, pointRadius: 3, borderDash:[4,4]},
        ]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        scales:{x:{grid:gridConfig, ticks:tickConfig}, y:{grid:gridConfig, ticks:{...tickConfig, callback:v=>(v/1000).toFixed(0)+'k'}}},
        plugins:{tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+fmtNum(ctx.raw)}}}
      }
    });
  }
}


function activateTab(name) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===name));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.toggle('active', t.id==='tab-'+name));
  destroyCharts();
  if (name==='overview') renderOverviewCharts();
  else if (name==='funnel') renderFunnelCharts();
  else if (name==='channels') renderChannelCharts();
  else if (name==='discounts') renderDiscountCharts();
  else if (name==='products') renderProductCharts();
  else if (name==='trade') renderTradeMeetingCharts();
  else if (name==='landing') renderLandingPagesCharts();
}

document.getElementById('tab-overview').innerHTML = buildOverview();
document.getElementById('tab-funnel').innerHTML = buildFunnel();
document.getElementById('tab-channels').innerHTML = buildChannels();
document.getElementById('tab-discounts').innerHTML = buildDiscounts();
document.getElementById('tab-products').innerHTML = buildProducts();
document.getElementById('tab-trade').innerHTML = buildTradeMeeting();
document.getElementById('tab-landing').innerHTML = buildLandingPages();

document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => activateTab(t.dataset.tab)));
activateTab('overview');
</script>
</body>
</html>
